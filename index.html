<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Fiyat Karşılaştırma</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 350px;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 80%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #4facfe;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            background: #4facfe;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #007bff;
        }
        
        select {
    width: 85%;
    padding: 10px;
    border-radius: 8px;
    border: 2px solid #ddd;
    font-size: 16px;
}
    </style>

</head>
<body>
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<div class="container">
    <h2>🔍 Ürün Arama </h2>

   <form action="sonuc.php" method="GET">

    <select name="arama" id="urunSec" required style="width: 250px;">
        <option value="">Ürün seç</option>
        <option value="iPhone 13">iPhone 13</option>
        <option value="iPhone 14">iPhone 14</option>
        <option value="Samsung S22">Samsung S22</option>
        <option value="Samsung S23">Samsung S23</option>
        <option value="Xiaomi Redmi Note 12">Xiaomi Redmi Note 12</option>
        <option value="Xiaomi Redmi Note 11">Xiaomi Redmi Note 11</option>
        <option value="Huawei P40">Huawei P40</option>
    </select>
    <br></br>
 <button type="submit">Karşılaştır</button>
</form>
<script>
$(document).ready(function() {
    $('#urunSec').select2({
        placeholder: "Ürün seç",
        allowClear: true
    });
});
</script>

    

</form>
</div>

</body>
</html>
